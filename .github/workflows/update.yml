name: Update F1 & WRC Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run updater
        run: python update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "F1-WRC Bot"
          git config user.email "bot@jedla.app"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: auto-update data $(date -u +%Y-%m-%d)"
          git push
